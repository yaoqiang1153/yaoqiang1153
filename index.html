<!DOCTYPE html>
<!-- 主图与右下角 PNG 已内嵌，只上传本文件即可直接打开显示 -->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>内容模板</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #000;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    /* 整体规格：3:5 的展示区域 */
    .frame {
      position: relative;
      width: 100vw;
      max-width: 600px;
      aspect-ratio: 3 / 5;
      background: #f5f5f5;
      overflow: hidden;
    }
    .card {
    }
    /* 图片区域：顶部置顶、宽占满、无圆角 */
    .image-wrap {
      width: 100%;
      cursor: pointer;
    }
    /* 用 padding-bottom 固定比例，避免截图时 html2canvas 导致主图变形 */
    .image-wrap-inner {
      position: relative;
      width: 100%;
      height: 0;
      padding-bottom: calc(3.5 / 3 * 100%);
      overflow: hidden;
      background: linear-gradient(135deg, #e8eaf0 0%, #dde1e8 100%);
    }
    .image-wrap-inner img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    #image-input {
      display: none;
    }
    .content {
      padding: 16px 20px 0;
    }
    .title {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.4;
      margin-bottom: 6px;
      cursor: pointer;
    }
    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 12px;
      line-height: 1.5;
      cursor: pointer;
    }
    .detail {
      font-size: 14px;
      color: #555;
      line-height: 1.65;
      cursor: pointer;
    }
    /* 编辑弹窗：多行、自动换行、可看到全部文字 */
    .edit-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .edit-overlay.show {
      display: flex;
    }
    .edit-box {
      width: 100%;
      max-width: 360px;
      max-height: 80vh;
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }
    .edit-label {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }
    .edit-textarea {
      width: 100%;
      min-height: 120px;
      max-height: 50vh;
      padding: 12px;
      font-size: 16px;
      line-height: 1.5;
      border: 1px solid #ddd;
      border-radius: 8px;
      resize: vertical;
      font-family: inherit;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .edit-actions {
      margin-top: 12px;
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    .edit-btn {
      padding: 10px 20px;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .edit-btn-cancel {
      background: #eee;
      color: #333;
    }
    .edit-btn-ok {
      background: #333;
      color: #fff;
    }
    /* 保存按钮：左下角，不参与截图 */
    .save-btn {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 9998;
      padding: 10px 18px;
      font-size: 14px;
      font-family: inherit;
      color: #fff;
      background: #333;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .save-btn:active {
      opacity: 0.9;
    }
    .save-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .corner-rect {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 110px;
      height: 45px;
      background: #333;
      border-radius: 999px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .corner-rect img {
      position: absolute;
      max-width: 70%;
      max-height: 70%;
      width: auto;
      height: auto;
      object-fit: contain;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="edit-overlay" id="edit-overlay">
    <div class="edit-box">
      <div class="edit-label" id="edit-label">修改内容</div>
      <textarea class="edit-textarea" id="edit-textarea" placeholder="请输入内容"></textarea>
      <div class="edit-actions">
        <button type="button" class="edit-btn edit-btn-cancel" id="edit-cancel">取消</button>
        <button type="button" class="edit-btn edit-btn-ok" id="edit-ok">确认</button>
      </div>
    </div>
  </div>
  <input type="file" id="image-input" accept="image/*">
  <div class="frame">
    <div class="card">

        <h1 class="title" id="page-title">《冬至吃饺子》</h1>
        <p class="subtitle" id="page-subtitle">这里是副标题，简要说明或补充信息</p>
        <p class="detail" id="page-detail">哇，你的&quot;饺子塔&quot;太有创意啦！一层层叠高高，每个饺子都有不同表情和花纹，像在开派对一样。既锻炼动手能力，又充满节日仪式感。冬至吃饺子，老师看着都觉得暖洋洋的❤️ 继续用你的巧手把生活画成童话吧！</p>

  <script>
    (function () {
      var overlay = document.getElementById('edit-overlay');
      var label = document.getElementById('edit-label');
      var textarea = document.getElementById('edit-textarea');
      var btnCancel = document.getElementById('edit-cancel');
      var btnOk = document.getElementById('edit-ok');
      var currentTarget = null;

      function openEdit(title, currentText, onConfirm) {
        currentTarget = { onConfirm: onConfirm };
        label.textContent = title;
        textarea.value = currentText;
        textarea.style.minHeight = '120px';
        overlay.classList.add('show');
        textarea.focus();
      }
      function closeEdit() {
        overlay.classList.remove('show');
        currentTarget = null;
      }
      function confirmEdit() {
        if (!currentTarget) return;
        var val = textarea.value;
        currentTarget.onConfirm(val);
        closeEdit();
      }

      btnCancel.addEventListener('click', closeEdit);
      btnOk.addEventListener('click', confirmEdit);
      overlay.addEventListener('click', function (e) {
        if (e.target === overlay) closeEdit();
      });

      var imageWrap = document.getElementById('image-wrap');
      var imageInput = document.getElementById('image-input');
      var cardImage = document.getElementById('card-image');
      if (imageWrap && imageInput && cardImage) {
        imageWrap.addEventListener('click', function () {
          imageInput.click();
        });
        imageInput.addEventListener('change', function () {
          var file = this.files && this.files[0];
          if (!file || !file.type.startsWith('image/')) return;
          if (cardImage._blobUrl) URL.revokeObjectURL(cardImage._blobUrl);
          cardImage._blobUrl = URL.createObjectURL(file);
          cardImage.src = cardImage._blobUrl;
          this.value = '';
        });
      }

      var titleEl = document.getElementById('page-title');
      var subtitleEl = document.getElementById('page-subtitle');
      var detailEl = document.getElementById('page-detail');

      if (titleEl) {
        titleEl.addEventListener('click', function () {
          openEdit('修改标题内容：', titleEl.textContent || '', function (val) {
            titleEl.textContent = val.trim();
          });
        });
      }
      if (subtitleEl) {
        subtitleEl.addEventListener('click', function () {
          openEdit('修改副标题内容：', subtitleEl.textContent || '', function (val) {
            subtitleEl.textContent = val.trim();
          });
        });
      }
      if (detailEl) {
        detailEl.addEventListener('click', function () {
          openEdit('修改详情内容：', detailEl.textContent || '', function (val) {
            detailEl.textContent = val.trim();
          });
        });
      }

      // 保存 3:5 区域为图片（不包含按钮）
      var saveBtn = document.getElementById('save-btn');
      var frameEl = document.querySelector('.frame');
      if (saveBtn && frameEl && typeof html2canvas !== 'undefined') {
        saveBtn.addEventListener('click', function () {
          saveBtn.disabled = true;
          saveBtn.textContent = '生成中…';
          html2canvas(frameEl, {
            scale: 2,
            useCORS: true,
            allowTaint: true,
            logging: false
          }).then(function (canvas) {
            canvas.toBlob(function (blob) {
              if (!blob) {
                saveBtn.disabled = false;
                saveBtn.textContent = '保存图片';
                return;
              }
              var file = new File([blob], 'card.png', { type: 'image/png' });
              var url = URL.createObjectURL(blob);

              function done() {
                saveBtn.disabled = false;
                saveBtn.textContent = '保存图片';
                setTimeout(function () { URL.revokeObjectURL(url); }, 500);
              }

              function downloadFallback() {
                var a = document.createElement('a');
                a.href = url;
                a.download = 'card.png';
                a.style.display = 'none';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
              }

              // 优先使用分享（iOS/Android 可选“存储图像”/“保存到相册”）
              if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                navigator.share({
                  files: [file],
                  title: '卡片图片'
                }).then(function () { done(); }).catch(function () {
                  downloadFallback();
                  done();
                });
                return;
              }
              downloadFallback();
              done();
            }, 'image/png');
          }).catch(function () {
            saveBtn.disabled = false;
            saveBtn.textContent = '保存图片';
          });
        });
      }
    })();
  </script>
</body>
</html>
